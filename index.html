<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon1.png">
    <link rel="apple-touch-icon" href="favicon1.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>O Criador | Oração Sagrada</title>
    <style>
        :root {
            --gold: #d4af37;
            --correct: #27ae60;
            --missing: #7f8c8d;
            --white: #ffffff;
        }

        body {
            margin: 0; padding: 0;
            /* Alterado de #050505 para o gradiente azul */
            background: linear-gradient(180deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            background-attachment: fixed; /* Mantém o fundo fixo ao rolar */
            color: var(--white);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow-x: hidden;
        }

        #app-container {
            width: 100%; max-width: 500px; min-height: 100vh;
            /* O gradiente aqui pode continuar ou ficar transparente */
            background: linear-gradient(180deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            display: flex; flex-direction: column; align-items: center;
            position: relative; box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        .ad-top {
            width: 100%; height: 60px; background: rgba(255,255,255,0.05);
            display: flex; justify-content: center; align-items: center;
            font-size: 10px; color: #555; margin-bottom: 10px;
        }

        .visual-area {
            width: 90%; height: 350px; margin-top: 20px;
            border-radius: 20px;
            background-image: url('scene.png'); 
            background-size: cover; background-position: center;
            position: relative; border: 2px solid var(--gold);
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.4);
        }

        .angel-bubble {
            position: absolute; bottom: -20px; left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.98); color: #111;
            padding: 15px 20px; border-radius: 12px;
            font-size: 0.85rem; font-weight: bold; width: 85%;
            text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.7);
            cursor: pointer; border: 2px solid var(--gold); z-index: 10;
            min-height: 60px; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
        }

        .click-hint {
            font-size: 9px; color: var(--gold); margin-top: 8px;
            text-transform: uppercase; letter-spacing: 1px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; }
        }

        .progress-panel {
            width: 90%;
            background: rgba(0, 0, 0, 0.4);
            margin-top: 40px;
            padding: 10px;
            border-radius: 10px;
            border-left: 4px solid var(--gold);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
        }

        .progress-title { font-size: 0.65rem; color: var(--gold); text-transform: uppercase; font-weight: bold; }
        .progress-value { font-size: 1.2rem; font-weight: 900; color: #fff; }

        .feedback-container {
            flex-grow: 1; width: 90%; margin: 15px 0 10px 0;
            display: flex; flex-wrap: wrap; justify-content: center;
            align-content: flex-start; gap: 8px;
        }

        .word-tile {
            padding: 8px 12px; border-radius: 5px; font-weight: bold;
            text-transform: uppercase; font-size: 0.75rem;
            border: 1px solid rgba(255,255,255,0.2);
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .controls {
            width: 100%; padding: 25px; background: rgba(0,0,0,0.5);
            border-radius: 30px 30px 0 0; box-sizing: border-box; text-align: center;
        }

        input[type="text"] {
            width: 90%; padding: 15px; border-radius: 10px;
            border: 1px solid var(--gold); background: rgba(0,0,0,0.3);
            color: white; font-size: 1rem; margin-bottom: 12px; outline: none;
            transition: all 0.3s;
        }

        input:focus { box-shadow: 0 0 10px var(--gold); }

        button {
            width: 90%; padding: 15px; background: var(--gold);
            border: none; border-radius: 10px; font-weight: 900;
            font-size: 1rem; cursor: pointer; color: #000;
            text-transform: uppercase; transition: transform 0.2s;
        }

        button:active { transform: scale(0.98); }
        button:disabled { background: #444; color: #777; cursor: not-allowed; }

        .stats { margin-top: 5px; font-size: 0.7rem; color: var(--gold); font-weight: bold; }
        .correct { background-color: var(--correct) !important; color: white; border-color: #1b5e20; }
        .missing { background-color: var(--missing) !important; color: white; border-color: #424242; }
        
        #hint-text {
            width: 90%; margin: 10px; font-size: 0.7rem; color: #d4af37;
            text-align: center; min-height: 15px;
        }
        /* Container das etiquetas dentro do balão */
.fragment-grid {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    margin-top: 15px; /* Espaço entre o texto do anjo e as palavras */
    width: 100%;
}

/* Estilo de cada palavra encontrada */
.sacred-fragment {
    background: rgba(212, 175, 55, 0.1);
    border: 1px solid var(--gold);
    color: #b8860b;
    padding: 5px 12px;
    border-radius: 8px;
    font-size: 0.7rem;
    text-transform: uppercase;
    font-weight: bold;
    animation: fadeIn 0.5s ease;
}
.confirm-box {
    display: flex;
    gap: 10px;
    margin-top: 15px;
    justify-content: center;
    width: 100%;
}

.btn-confirm {
    background: var(--gold);
    color: #000;
    border: none;
    padding: 8px 15px;
    border-radius: 5px;
    font-size: 0.7rem;
    font-weight: bold;
    cursor: pointer;
    text-transform: uppercase;
}

.btn-cancel {
    background: transparent;
    color: var(--gold);
    border: 1px solid var(--gold);
    padding: 8px 15px;
    border-radius: 5px;
    font-size: 0.7rem;
    font-weight: bold;
    cursor: pointer;
    text-transform: uppercase;
}
/* Estilo do Cabeçalho do Portal */
.header-portal {
    width: 90%;
    text-align: center;
    margin-top: 15px;
    margin-bottom: 5px;
    z-index: 5;
}

.main-title {
    margin: 0;
    padding: 0;
    font-size: 1.8rem;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 2px;
    
    /* Gradiente de Ouro */
    background: linear-gradient(to bottom, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C);
    
    /* ADICIONE A LINHA ABAIXO PARA RESOLVER O ERRO: */
    -webkit-background-clip: text; /* Prefixo para Chrome/Safari */
    background-clip: text;         /* Propriedade Padrão (Resolve o erro) */
    
    -webkit-text-fill-color: transparent;
    
    filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.5));
    animation: titleGlow 4s infinite alternate;
}   

.sub-title {
    margin: -5px 0 0 0;
    padding: 0;
    font-size: 0.8rem;
    font-weight: 900; /* Mesma espessura do título */
    color: var(--white);
    text-transform: uppercase;
    letter-spacing: 5px;
    opacity: 0.8;
}

/* Animação para o brilho oscilar */
@keyframes titleGlow {
    from { filter: drop-shadow(0 0 5px rgba(212, 175, 55, 0.4)); }
    to { filter: drop-shadow(0 0 20px rgba(212, 175, 55, 0.8)); }
}
.portal-footer {
    width: 100%;
    padding: 15px 0;
    text-align: center;
    background: rgba(0, 0, 0, 0.2); /* Fundo sutil */
}

.portal-footer a {
    color: var(--gold);
    text-decoration: none;
    font-size: 0.65rem;
    font-weight: bold;
    letter-spacing: 1px;
    opacity: 0.7;
    transition: opacity 0.3s;
}

.portal-footer a:hover {
    opacity: 1;
    text-decoration: underline;
}

.portal-footer p {
    margin-top: 5px;
    font-size: 0.55rem;
    color: rgba(255, 255, 255, 0.3);
    text-transform: uppercase;
    letter-spacing: 1px;
}
.ad-container-top {
    width: 100%;
    min-height: 50px; /* Altura exata do anúncio solicitado */
    display: flex;
    justify-content: center;
    align-items: center;
    background: rgba(0,0,0,0.1); /* Um fundo bem sutil */
    margin-bottom: 10px;
    flex-shrink: 0;
}
/* Escondido por padrão (Mobile) */
.ad-sidebar {
    display: none;
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    width: 160px;
    height: 600px;
    z-index: 1;
}

/* Aparece apenas em Monitores Grandes (Desktop) */
@media (min-width: 1100px) {
    .ad-sidebar {
        display: block;
    }
    /* Posiciona exatamente ao lado do container de 500px */
    .ad-left { left: calc(50% - 250px - 180px); }
    .ad-right { right: calc(50% - 250px - 180px); }
}
    </style>
</head>
<body>
<div class="ad-sidebar ad-left" id="ad-slot-left"></div>
<div class="ad-sidebar ad-right" id="ad-slot-right"></div>
<div id="app-container">
    <div class="ad-container-top">
        <div id="ad-slot-top"></div>
    </div>

    <div class="header-portal">
        <h1 class="main-title">O CRIADOR</h1>
        <h2 class="sub-title">A ORAÇÃO SAGRADA</h2>
    </div>
    <div class="visual-area">
    <div class="angel-bubble" id="angel-container" onclick="handleDialogueClick()">
        <div id="angel-text"></div> 
        <div id="fragment-box" class="fragment-grid"></div>
        <div class="click-hint" id="click-hint" style="display:none;">Clique para continuar</div>
    </div>
</div>

    <div class="progress-panel">
        <div>
            <div class="progress-title">Fragmentos Encontrados</div>
            <div id="found-count" class="progress-value">0 / 15</div>
        </div>
        <div style="text-align: right;">
            <div class="progress-title">Tentativas Restantes</div>
            <div id="attempts-left" class="progress-value">15</div>
        </div>
    </div>

    <div id="stats" class="stats">FASE DE COLETA</div>
    <div id="hint-text"></div>
    <div class="feedback-container" id="feedback"></div>

    <div class="controls">
        <input type="text" id="email-input" placeholder="Seu melhor e-mail..." style="display: none; margin-bottom: 10px; border: 1px solid var(--gold);">
        <input type="text" id="prayer-input" placeholder="..." autocomplete="off" disabled>
        <button id="share-btn" onclick="shareProgress()" style="display: none; background: transparent; border: 1px solid var(--gold); color: var(--gold); margin-bottom: 15px; font-size: 0.75rem; width: 90%; padding: 10px; border-radius: 10px; cursor: pointer;">
    COMPARTILHAR FRAGMENTOS
</button>
        <button id="submit-btn" onclick="processInput()" disabled>Aguardando...</button>
    </div>
    <footer class="portal-footer">
    <a href="privacidade.html">POLÍTICA DE PRIVACIDADE</a>
    <p> O CRIADOR© 2026</p>
</footer>


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL = 'https://xtdiihqsfxngtqyldfjr.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh0ZGlpaHFzZnhuZ3RxeWxkZmpyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1ODE2MzIsImV4cCI6MjA5MjE1NzYzMn0.Z-LmLJdYxHKoWtHYIvOV38K7e-hhiB4CdWYDZ1Stb5c';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Variáveis da Oração (agora dinâmicas)
    let masterPhrase = ""; 
    let masterPhraseNormalized = "";
    let masterArrayNormalized = [];
    let uniqueWordsInMasterCount = 0;
    
    const dialogues = [
        "Aproxime-se, mortal. Você está diante do Criador.",
        "Neste exato momento, Ele está profundamente ocupado com os assuntos do Universo.",
        "A atenção divina é um recurso escasso, porém existe uma chance de você ser ouvido.",
        "Saiba que descobrir sozinho a Oração Sagrada é praticamente impossível.",
        "Apenas com a união dos mortais a Oração Sagrada pode ser construída, mas ele ouvirá apenas uma prece por dia, então seja o primeiro a descobrir.",
        "Sua jornada terá duas etapas: Primeiro, a COLETA, onde você terá 15 chances para testar palavras isoladas.",
        "Palavras VERDES são fragmentos reais. Palavras CINZAS são apenas ruídos mundanos.",
        "Segundo, o MILAGRE: você deverá unir os fragmentos reais na ordem perfeita para formar a Oração Sagrada e ser compreendido por Ele.",
        "Se falhar e a sua Oração estiver errada, seu acesso ao Criador será impedido até o dia seguinte.",
        "As recompensas para quem rompe o silêncio são inestimáveis. O tempo é curto, tente descobrir a Oração Sagrada!"
    ];

    let currentDialogueIndex = 0;
    let collectionCount = 0;
    let foundWords = [];
    let isTyping = false;
    let gamePhase = "dialogue"; 
    let userIP = '';

    // Inicialização
    window.onload = async function() {
        setVh(); // Ajuste de altura para mobile
        const fraseCarregada = await fetchDailyPhrase();
        if (fraseCarregada) {
            await checkGlobalBlock();
        } else {
            document.getElementById('angel-text').innerText = "O Trono está em silêncio profundo. Volte em outro ciclo solar.";
        }
    };

    // BUSCA A FRASE DO DIA NO SUPABASE
    async function fetchDailyPhrase() {
        try {
            const hoje = new Date().toISOString().split('T')[0];
            const { data, error } = await _supabase
                .from('oracoes_diarias')
                .select('frase')
                .eq('data', hoje)
                .single();

            if (data && !error) {
                masterPhrase = data.frase;
                masterPhraseNormalized = normalizeText(masterPhrase);
                masterArrayNormalized = masterPhraseNormalized.split(" ");
                uniqueWordsInMasterCount = [...new Set(masterArrayNormalized)].length;
                
                // Atualiza o contador inicial na UI
                document.getElementById('found-count').innerText = `0 / ${uniqueWordsInMasterCount}`;
                return true;
            }
            return false;
        } catch (err) {
            console.error("Erro ao buscar oração:", err);
            return false;
        }
    }

    async function checkGlobalBlock() {
    try {
        const res = await fetch('https://api.ipify.org?format=json');
        const data = await res.json();
        userIP = data.ip;

        // Busca todas as atividades do IP nas últimas 24h
        const { data: activities } = await _supabase
            .from('tentativas_oracao')
            .select('status')
            .eq('ip_address', userIP)
            .gt('created_at', new Date(Date.now() - 24 * 60 * 60 * 1000).toISOString());

        if (activities) {
            // Se houver status 'falhou' ou 'sucesso', bloqueia direto
            const isBlocked = activities.some(a => a.status === 'falhou' || a.status === 'sucesso');
            if (isBlocked) {
                applyBlock();
                return;
            }

            // Conta quantas vezes ele já fez 'coleta'
            const pastCollections = activities.filter(a => a.status === 'coleta').length;
            collectionCount = pastCollections;

            if (collectionCount >= 15) {
                // Se já coletou 15, pula direto para a fase final
                gamePhase = "prayer";
                startFinalPhase(); 
            } else {
                // Se ainda tem tentativas, começa o diálogo
                typeWriter(dialogues[0]); 
            }
        } else {
            typeWriter(dialogues[0]);
        }
    } catch (err) {
        typeWriter(dialogues[0]); 
    }
}

    function normalizeText(text) {
        return text.toLowerCase()
                   .normalize("NFD")
                   .replace(/[\u0300-\u036f]/g, "")
                   .trim();
    }

    function typeWriter(text, i = 0) {
        isTyping = true;
        const hint = document.getElementById('click-hint');
        if (hint) hint.style.display = 'none';
        
        if (i < text.length) {
            document.getElementById('angel-text').innerHTML = text.substring(0, i+1);
            setTimeout(() => typeWriter(text, i + 1), 30);
        } else {
            isTyping = false;
            if (hint && gamePhase === "dialogue") hint.style.display = 'block';
        }
    }

    function handleDialogueClick() {
        if (isTyping || gamePhase !== "dialogue") return;
        if (currentDialogueIndex < dialogues.length - 1) {
            currentDialogueIndex++;
            typeWriter(dialogues[currentDialogueIndex]);
        } else {
            unlockControls();
        }
    }

    function unlockControls() {
        gamePhase = "collection"; 
        const input = document.getElementById('prayer-input');
        const btn = document.getElementById('submit-btn');
        const hint = document.getElementById('click-hint');
        if (hint) hint.style.display = 'none';
        document.getElementById('angel-text').innerText = "Tente encontrar os fragmentos da Oração Divina.";
        input.disabled = false;
        btn.disabled = false;
        btn.innerText = "TESTAR PALAVRA";
        input.placeholder = "A Oração de hoje tem 15 fragmentos...";
        document.getElementById('stats').innerText = `COLETA ATIVA (15 PALAVRAS)`;
    }

    function applyBlock() {
        gamePhase = "blocked";
        const bubble = document.getElementById('angel-text');
        const input = document.getElementById('prayer-input');
        const btn = document.getElementById('submit-btn');
        const shareBtn = document.getElementById('share-btn');
        
        if (shareBtn) shareBtn.style.display = 'inline-block';
        bubble.innerText = "O Trono está selado. O Criador não aceita mais suas súplicas por hoje.";
        bubble.style.background = "transparent"; 
        bubble.style.color = "#666";
        bubble.style.borderColor = "transparent";
        bubble.style.boxShadow = "none";
        input.disabled = true;
        btn.disabled = true;
        btn.innerText = "ACESSO NEGADO";
    }

    function processInput() {
        const input = document.getElementById('prayer-input');
        const rawInput = input.value.trim();
        const normalizedInput = normalizeText(rawInput);

        if (gamePhase === "collection") {
            if (!normalizedInput || normalizedInput.split(/\s+/).length > 1) {
                alert("Apenas uma palavra por vez.");
                return;
            }
            collectionCount++;

            // REGISTRO NO BANCO: Evita que o usuário burlar o limite abrindo novas abas
            _supabase.from('tentativas_oracao').insert([
                { ip_address: userIP, status: 'coleta', pedido: normalizedInput }
            ]).then();

            document.getElementById('attempts-left').innerText = 15 - collectionCount;
            
            const tile = document.createElement('div');
            tile.classList.add('word-tile');
            tile.innerText = rawInput;

            if (masterArrayNormalized.includes(normalizedInput)) {
                tile.classList.add('correct');
                if (!foundWords.includes(normalizedInput)) {
                    foundWords.push(normalizedInput);
                    document.getElementById('found-count').innerText = `${foundWords.length} / ${uniqueWordsInMasterCount}`;
                }
            } else {
                tile.classList.add('missing');
            }

            document.getElementById('feedback').appendChild(tile);
            input.value = "";

            if (collectionCount >= 15) {
                startFinalPhase();
            }
        } else if (gamePhase === "prayer") {
            submitFinalPrayer();
        } else if (gamePhase === "victory") {
            sendDivineRequest();
        }
    }

    function startFinalPhase() {
        gamePhase = "prayer";
        const text = document.getElementById('angel-text');
        const box = document.getElementById('fragment-box');
        const shareBtn = document.getElementById('share-btn');
        text.innerText = "A busca pelos fragmentos foi encerrada. Use-os com sabedoria:";
        box.innerHTML = ""; 
        foundWords.forEach(w => {
            const span = document.createElement('span');
            span.className = 'sacred-fragment';
            span.innerText = w;
            box.appendChild(span);
        });
        document.getElementById('submit-btn').innerText = "ENVIAR ORAÇÃO SAGRADA";
        document.getElementById('stats').innerText = "FASE FINAL";
        if (shareBtn) shareBtn.style.display = 'inline-block';
    }

    async function submitFinalPrayer() {
        const input = document.getElementById('prayer-input');
        const bubble = document.getElementById('angel-text');
        const box = document.getElementById('fragment-box');
        const btn = document.getElementById('submit-btn');

        if (!input.value.trim()) return;

        // Interface de Confirmação Única
        input.style.display = "none";
        btn.style.display = "none";
        box.style.display = "none";

        bubble.innerText = "Atenção, Mortal. Você está prestes a proferir a Oração Sagrada. O Criador só ouve uma voz por dia, e esta será sua única tentativa. Deseja prosseguir?";

        const confirmBox = document.createElement('div');
        confirmBox.className = 'confirm-box';
        confirmBox.id = 'confirmation-ui';
        confirmBox.innerHTML = `
            <button class="btn-confirm" onclick="executeFinalSubmission()">PROSSEGUIR</button>
            <button class="btn-cancel" onclick="cancelSubmission()">VOLTAR</button>
        `;
        bubble.appendChild(confirmBox);
    }

    function cancelSubmission() {
        document.getElementById('prayer-input').style.display = "block";
        document.getElementById('submit-btn').style.display = "block";
        document.getElementById('fragment-box').style.display = "flex";
        document.getElementById('confirmation-ui').remove();
        document.getElementById('angel-text').innerText = "A busca pelos fragmentos foi encerrada. Use-os com sabedoria:";
    }

    async function executeFinalSubmission() {
        const input = document.getElementById('prayer-input');
        const emailInput = document.getElementById('email-input');
        const btn = document.getElementById('submit-btn');
        const bubble = document.getElementById('angel-text');
        const userTextNormalized = normalizeText(input.value);

        document.getElementById('confirmation-ui').remove();

        if (userTextNormalized === masterPhraseNormalized) {
            gamePhase = "victory";
            bubble.innerText = "MILAGRE! O Criador ouve sua voz. Deixe seu e-mail e sua prece abaixo.";
            bubble.style.color = "var(--gold)";
            emailInput.style.display = "block";
            input.style.display = "block";
            btn.style.display = "block";
            input.value = "";
            input.placeholder = "Qual a sua prece, mortal?";
            btn.innerText = "ENTREGAR PEDIDO";
        } else {
            bubble.innerText = "Sua voz foi silenciada pelo erro. O Criador permanece ocupado.";
            await _supabase.from('tentativas_oracao').insert([{ ip_address: userIP, status: 'falhou' }]);
            gamePhase = "blocked";
            setTimeout(applyBlock, 2000);
        }
    }

    async function sendDivineRequest() {
        const input = document.getElementById('prayer-input');
        const emailInput = document.getElementById('email-input');
        const btn = document.getElementById('submit-btn');
        const requestText = input.value.trim();
        const emailText = emailInput.value.trim();
        if (!requestText || !emailText) {
            alert("Preencha ambos os campos.");
            return;
        }
        btn.disabled = true;
        btn.innerText = "ENVIANDO...";
        const { error } = await _supabase.from('tentativas_oracao').insert([
            { ip_address: userIP, status: 'sucesso', pedido: requestText, email: emailText }
        ]);
        if (!error) {
            document.getElementById('angel-text').innerText = "Sua prece foi entregue ao Criador. Aguarde o destino.";
            input.style.display = "none";
            emailInput.style.display = "none";
            btn.innerText = "PEDIDO ENTREGUE";
            document.getElementById('share-btn').style.display = 'inline-block';
        } else {
            alert("Erro ao enviar.");
            btn.disabled = false;
        }
    }

    function shareProgress() {
        const total = uniqueWordsInMasterCount;
        const encontrados = foundWords.length;
        const url = "https://ocriador.fun";
        const listaPalavras = foundWords.map(w => w.toUpperCase()).join(", ");
        let text = encontrados > 0 
            ? `Consegui descobrir ${encontrados} de ${total} fragmentos: [ ${listaPalavras} ]. Você consegue encontrar algum?`
            : `Tentei clamar ao Criador, mas Ele permaneceu em silêncio.`;
        if (navigator.share) {
            navigator.share({ title: 'O Criador', text: text, url: url });
        } else {
            navigator.clipboard.writeText(`${text} ${url}`);
            alert("Copiado!");
        }
    }

    function setVh() {
        let vh = window.innerHeight * 0.01;
        document.documentElement.style.setProperty('--vh', `${vh}px`);
    }

    window.addEventListener('resize', setVh);
    document.getElementById('prayer-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') processInput();
    });
    function injectTopAd() {
    const container = document.getElementById('ad-slot-top');
    if (!container) return;

    // Injeta as configurações (atOptions)
    const scriptConfig = document.createElement('script');
    scriptConfig.type = 'text/javascript';
    scriptConfig.text = `
        atOptions = {
            'key' : '60d42cf26d254483080b52fc8a771b1f',
            'format' : 'iframe',
            'height' : 50,
            'width' : 320,
            'params' : {}
        };
    `;

    // Injeta o script carregador (invoke.js)
    const scriptInvoke = document.createElement('script');
    scriptInvoke.type = 'text/javascript';
    scriptInvoke.src = 'https://www.highperformanceformat.com/60d42cf26d254483080b52fc8a771b1f/invoke.js';

    container.appendChild(scriptConfig);
    container.appendChild(scriptInvoke);
}

// Executa após o carregamento inicial para não atrasar o jogo
window.addEventListener('load', () => {
    setTimeout(injectTopAd, 500); 
});
function loadSideAds() {
    // Só executa se a tela for grande o suficiente
    if (window.innerWidth < 1100) return;

    const sideSlots = ['ad-slot-left', 'ad-slot-right'];
    
    sideSlots.forEach(slotId => {
        const container = document.getElementById(slotId);
        if (!container) return;

        // Script de configuração
        const config = document.createElement('script');
        config.type = 'text/javascript';
        config.text = `
            atOptions = {
                'key' : 'd89c05280dbb252374a897d51c51ccf7',
                'format' : 'iframe',
                'height' : 600,
                'width' : 160,
                'params' : {}
            };
        `;

        // Script de execução
        const invoke = document.createElement('script');
        invoke.type = 'text/javascript';
        invoke.src = 'https://www.highperformanceformat.com/d89c05280dbb252374a897d51c51ccf7/invoke.js';

        container.appendChild(config);
        container.appendChild(invoke);
    });
}

// Inicia o carregamento 2 segundos após o jogo carregar
window.addEventListener('load', () => {
    setTimeout(loadSideAds, 500);
});
</script>
